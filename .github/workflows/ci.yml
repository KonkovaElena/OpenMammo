name: standalone-ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: python_sidecar/requirements.txt

      - name: Install Python sidecar dependencies
        run: python -m pip install -r python_sidecar/requirements.txt

      - name: Test Python sidecar scaffold
        run: python -m unittest python_sidecar.tests.test_app

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Runtime smoke
        run: npm run smoke:health

      - name: Coverage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p coverage
          npm run test:coverage | tee coverage/summary.txt

      - name: Audit runtime dependencies
        if: runner.os == 'Linux'
        run: npm audit --omit=dev --audit-level=high

      - name: Archive dist artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mammography-second-opinion-dist-${{ github.sha }}
          path: dist
          retention-days: 7
          if-no-files-found: error

      - name: Archive coverage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mammography-second-opinion-coverage-${{ github.sha }}
          path: coverage/summary.txt
          retention-days: 7
          if-no-files-found: error

      - name: Validate standalone
        if: runner.os == 'Linux'
        run: npm run validate:public-export

  container-smoke:
    name: Container smoke
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Build container image
        run: docker build --tag mammography-second-opinion:${{ github.sha }} .

      - name: Smoke container health endpoints
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            local exit_code=$?

            if docker ps -a --format '{{.Names}}' | grep -qx 'mammography-second-opinion-smoke'; then
              if [ "$exit_code" -ne 0 ]; then
                docker logs mammography-second-opinion-smoke || true
              fi

              docker stop mammography-second-opinion-smoke >/dev/null || true
            fi
          }

          trap cleanup EXIT
          docker run -d --rm --name mammography-second-opinion-smoke -p 18080:4030 mammography-second-opinion:${{ github.sha }}
          node scripts/smoke-health.mjs --skip-start --base-url http://127.0.0.1:18080
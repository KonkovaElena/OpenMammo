openapi: 3.1.0
info:
  title: Mammography Second Opinion API
  version: 0.1.0
  description: FFDM mammography standalone kernel API.
components:
  schemas:
    ProductInfo:
      type: object
      required: [name, version, mode]
      properties:
        name:
          type: string
          const: mammography-second-opinion
        version:
          type: string
          const: 0.1.0
        mode:
          type: string
          const: clinician-in-the-loop
    RuntimeStatus:
      type: object
      required: [metricsEnabled, shuttingDown, uptimeSeconds]
      properties:
        metricsEnabled:
          type: boolean
        shuttingDown:
          type: boolean
        uptimeSeconds:
          type: number
    HealthResponse:
      type: object
      required: [status, product, scope, safety]
      properties:
        status:
          type: string
          const: ok
        product:
          $ref: '#/components/schemas/ProductInfo'
        scope:
          type: object
        safety:
          type: object
    ReadyResponse:
      type: object
      required: [status, product, runtime]
      properties:
        status:
          type: string
          enum: [ready, shutting_down]
        product:
          $ref: '#/components/schemas/ProductInfo'
        runtime:
          $ref: '#/components/schemas/RuntimeStatus'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId, correlationId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            correlationId:
              type: string
    CaseAssessment:
      type: object
      required: [biradsCategory, summary, confidenceBand, outputMode]
      properties:
        biradsCategory:
          type: string
          enum: ['0', '1', '2', '3', '4', '5', '6']
        summary:
          type: string
        confidenceBand:
          type: string
          enum: [high, moderate, low]
        outputMode:
          type: string
          const: draft-only
    CaseSafety:
      type: object
      required: [flagCount, hasBlockingFlags]
      properties:
        flagCount:
          type: integer
        hasBlockingFlags:
          type: boolean
    CaseQualityFinding:
      type: object
      required: [code, severity, description]
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [info, warning]
        description:
          type: string
    CaseQuality:
      type: object
      required: [status, findingCount, findings]
      properties:
        status:
          type: string
          enum: [pass, warning]
        findingCount:
          type: integer
        findings:
          type: array
          items:
            $ref: '#/components/schemas/CaseQualityFinding'
    DraftGenerationStage:
      type: object
      required: [name, status, latencyMs]
      properties:
        name:
          type: string
          enum: [exam-qc, draft-generation, safety-evaluation]
        status:
          type: string
          const: completed
        latencyMs:
          type: integer
    DraftGenerationSummary:
      type: object
      required: [orchestratorId, modelId, totalLatencyMs, stages]
      properties:
        orchestratorId:
          type: string
        modelId:
          type: string
        totalLatencyMs:
          type: integer
        stages:
          type: array
          items:
            $ref: '#/components/schemas/DraftGenerationStage'
    CaseReview:
      type: object
      required: [reviewerName, reviewerRole, disposition, finalBiradsCategory, finalSummary, reviewNotes, finalizedAt]
      properties:
        reviewerName:
          type: string
        reviewerRole:
          type: string
        disposition:
          type: string
          enum: [confirmed, modified]
        finalBiradsCategory:
          type: string
          enum: ['0', '1', '2', '3', '4', '5', '6']
        finalSummary:
          type: string
        reviewNotes:
          type: string
        finalizedAt:
          type: string
          format: date-time
    CaseDelivery:
      type: object
      required: [channel, destination, recipientName, deliveredBy, deliveredAt]
      properties:
        channel:
          type: string
          enum: [ehr, secure-email, worklist]
        destination:
          type: string
        recipientName:
          type: string
        deliveredBy:
          type: string
        deliveredAt:
          type: string
          format: date-time
    RenderedReport:
      type: object
      required: [format, filename, renderedAt, body]
      properties:
        format:
          type: string
          const: text/plain
        filename:
          type: string
        renderedAt:
          type: string
          format: date-time
        body:
          type: string
    MammographyCaseSubmittedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        type:
          type: string
          const: mammography.case-submitted.v1
        payload:
          type: object
          required: [modality, studyInstanceUid, standardViews, questionText, urgency]
          properties:
            modality:
              type: string
              const: FFDM
            studyInstanceUid:
              type: string
            standardViews:
              type: array
              prefixItems:
                - const: L-CC
                - const: L-MLO
                - const: R-CC
                - const: R-MLO
              minItems: 4
              maxItems: 4
            questionText:
              type: string
            urgency:
              type: string
              enum: [routine, urgent, stat]
    MammographyDraftGeneratedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        type:
          type: string
          const: mammography.draft-generated.v1
        payload:
          type: object
          required: [biradsCategory, confidenceBand, outputMode, modelId, latencyMs]
          properties:
            biradsCategory:
              type: string
              enum: ['0', '1', '2', '3', '4', '5', '6']
            confidenceBand:
              type: string
              enum: [high, moderate, low]
            outputMode:
              type: string
              const: draft-only
            modelId:
              type: string
            latencyMs:
              type: integer
    MammographyExamQcEvaluatedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        type:
          type: string
          const: mammography.exam-qc-evaluated.v1
        payload:
          $ref: '#/components/schemas/CaseQuality'
    MammographyDraftOrchestrationCompletedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        type:
          type: string
          const: mammography.draft-orchestration-completed.v1
        payload:
          $ref: '#/components/schemas/DraftGenerationSummary'
    MammographyCaseReviewFinalizedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        type:
          type: string
          const: mammography.case-review-finalized.v1
        payload:
          $ref: '#/components/schemas/CaseReview'
    MammographyCaseDeliveredEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        type:
          type: string
          const: mammography.case-delivered.v1
        payload:
          $ref: '#/components/schemas/CaseDelivery'
    MammographySafetyFlagsAppliedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        type:
          type: string
          const: mammography.safety-flags-applied.v1
        payload:
          type: object
          required: [flagCount, hasBlockingFlags, flags]
          properties:
            flagCount:
              type: integer
            hasBlockingFlags:
              type: boolean
            flags:
              type: array
              items:
                type: object
                required: [code, severity, description, blocksReview]
                properties:
                  code:
                    type: string
                  severity:
                    type: string
                    enum: [info, warning, critical]
                  description:
                    type: string
                  blocksReview:
                    type: boolean
    MammographyCaseLifecycleEvent:
      oneOf:
        - $ref: '#/components/schemas/MammographyCaseSubmittedEvent'
        - $ref: '#/components/schemas/MammographyExamQcEvaluatedEvent'
        - $ref: '#/components/schemas/MammographyDraftGeneratedEvent'
        - $ref: '#/components/schemas/MammographySafetyFlagsAppliedEvent'
        - $ref: '#/components/schemas/MammographyDraftOrchestrationCompletedEvent'
        - $ref: '#/components/schemas/MammographyCaseReviewFinalizedEvent'
        - $ref: '#/components/schemas/MammographyCaseDeliveredEvent'
    CaseResponse:
      type: object
      required: [caseId, status, assessment, qc, generation, review, delivery, safety]
      properties:
        caseId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Submitted, AwaitingReview, Finalized]
        assessment:
          anyOf:
            - $ref: '#/components/schemas/CaseAssessment'
            - type: 'null'
        qc:
          anyOf:
            - $ref: '#/components/schemas/CaseQuality'
            - type: 'null'
        generation:
          anyOf:
            - $ref: '#/components/schemas/DraftGenerationSummary'
            - type: 'null'
        review:
          anyOf:
            - $ref: '#/components/schemas/CaseReview'
            - type: 'null'
        delivery:
          anyOf:
            - $ref: '#/components/schemas/CaseDelivery'
            - type: 'null'
        safety:
          $ref: '#/components/schemas/CaseSafety'
    CaseReportResponse:
      type: object
      required: [caseId, status, report]
      properties:
        caseId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Finalized]
        report:
          $ref: '#/components/schemas/RenderedReport'
    OhifReviewSeamResponse:
      type: object
      required: [caseId, viewer, dataSource, workflow]
      properties:
        caseId:
          type: string
          format: uuid
        viewer:
          type: object
          required: [vendor, viewerPath, query]
          properties:
            vendor:
              type: string
              const: OHIF
            viewerPath:
              type: string
              const: /viewer
            query:
              type: object
              required: [StudyInstanceUIDs, modalities]
              properties:
                StudyInstanceUIDs:
                  type: array
                  items:
                    type: string
                modalities:
                  type: string
                  const: MG
        dataSource:
          type: object
          required: [namespace, sourceName, qidoRoot, wadoRoot, wadoUriRoot, ready]
          properties:
            namespace:
              type: string
              const: dicomweb
            sourceName:
              type: string
            qidoRoot:
              anyOf:
                - type: string
                - type: 'null'
            wadoRoot:
              anyOf:
                - type: string
                - type: 'null'
            wadoUriRoot:
              anyOf:
                - type: string
                - type: 'null'
            ready:
              type: boolean
        workflow:
          type: object
          required: [caseStatus, reviewReady]
          properties:
            caseStatus:
              type: string
              enum: [Submitted, AwaitingReview, Finalized]
            reviewReady:
              type: boolean
    DicomwebArchiveSeamResponse:
      type: object
      required: [caseId, study, archive, workflow]
      properties:
        caseId:
          type: string
          format: uuid
        study:
          type: object
          required: [studyInstanceUid, accessionNumber, modality]
          properties:
            studyInstanceUid:
              type: string
            accessionNumber:
              anyOf:
                - type: string
                - type: 'null'
            modality:
              type: string
              const: MG
        archive:
          type: object
          required: [vendor, sourceName, dicomwebRoot, qidoRoot, wadoRoot, wadoUriRoot, ready]
          properties:
            vendor:
              type: string
              const: Orthanc
            sourceName:
              type: string
            qidoRoot:
              anyOf:
                - type: string
                - type: 'null'
            wadoRoot:
              anyOf:
                - type: string
                - type: 'null'
            wadoUriRoot:
              anyOf:
                - type: string
                - type: 'null'
            dicomwebRoot:
              anyOf:
                - type: string
                - type: 'null'
            ready:
              type: boolean
        workflow:
          type: object
          required: [ohifReviewSeamPath, reviewReady]
          properties:
            ohifReviewSeamPath:
              type: string
            reviewReady:
              type: boolean
    CaseEventsResponse:
      type: object
      required: [caseId, count, events]
      properties:
        caseId:
          type: string
          format: uuid
        count:
          type: integer
        events:
          type: array
          items:
            $ref: '#/components/schemas/MammographyCaseLifecycleEvent'
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      operationId: getReadiness
      responses:
        '200':
          description: Readiness status when the process is accepting work.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Readiness status when the process is shutting down.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /metrics:
    get:
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus metrics output
  /api/v1/manifest:
    get:
      operationId: getManifest
      responses:
        '200':
          description: Machine-readable scope manifest
  /api/v1/cases:
    post:
      operationId: createCase
      responses:
        '201':
          description: Draft mammography case created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during case intake
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/cases/{caseId}/review:
    post:
      operationId: finalizeCaseReview
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewerName, reviewerRole, disposition, finalBiradsCategory, finalSummary, reviewNotes]
              properties:
                reviewerName:
                  type: string
                reviewerRole:
                  type: string
                disposition:
                  type: string
                  enum: [confirmed, modified]
                finalBiradsCategory:
                  type: string
                  enum: ['0', '1', '2', '3', '4', '5', '6']
                finalSummary:
                  type: string
                reviewNotes:
                  type: string
      responses:
        '200':
          description: Clinician review finalized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '400':
          description: Invalid clinician review body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Case not found in the configured persistence store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Case review cannot be finalized from the current workflow state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during review finalization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/cases/{caseId}/report:
    get:
      operationId: renderCaseReport
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Finalized clinician report rendered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseReportResponse'
        '404':
          description: Case not found in the configured persistence store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Case exists but clinician finalization has not completed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during report rendering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/cases/{caseId}/deliver:
    post:
      operationId: deliverCaseReport
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, destination, recipientName, deliveredBy]
              properties:
                channel:
                  type: string
                  enum: [ehr, secure-email, worklist]
                destination:
                  type: string
                recipientName:
                  type: string
                deliveredBy:
                  type: string
      responses:
        '200':
          description: Finalized case delivery tracked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '400':
          description: Invalid delivery body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Case not found in the configured persistence store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Case delivery cannot be recorded from the current workflow state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during delivery tracking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/cases/{caseId}/review-seams/ohif:
    get:
      operationId: renderOhifReviewSeam
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OHIF-compatible launch manifest for case review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OhifReviewSeamResponse'
        '404':
          description: Case not found in the configured persistence store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during OHIF seam rendering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/cases/{caseId}/archive-seams/dicomweb:
    get:
      operationId: renderDicomwebArchiveSeam
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Orthanc-compatible DICOMweb archive handoff manifest for the case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DicomwebArchiveSeamResponse'
        '404':
          description: Case not found in the configured persistence store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during DICOMweb archive seam rendering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/cases/{caseId}:
    get:
      operationId: getCaseById
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Persisted draft mammography case retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '404':
          description: Case not found in the configured persistence store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during case retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/cases/{caseId}/events:
    get:
      operationId: getCaseEventsById
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Persisted lifecycle events for the mammography case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseEventsResponse'
        '404':
          description: Case not found in the configured persistence store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during case event retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

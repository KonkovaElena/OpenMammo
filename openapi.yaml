openapi: 3.1.0
info:
  title: Mammography Second Opinion API
  version: 0.1.0
  description: FFDM mammography standalone kernel API.
components:
  parameters:
    AuthorizationBearerHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
      description: Optional in unauthenticated development mode. Required for `/api/v1/cases` and nested case routes when `AUTH_BEARER_TOKEN` is configured. Use `Bearer <token>` per RFC 6750.
    ActorIdHeader:
      name: x-actor-id
      in: header
      required: false
      schema:
        type: string
      description: Optional caller-supplied actor identifier persisted into lifecycle event audit metadata only when static bearer auth is not configured.
    ActorRoleHeader:
      name: x-actor-role
      in: header
      required: false
      schema:
        type: string
      description: Optional caller-supplied actor role persisted into lifecycle event audit metadata only when static bearer auth is not configured.
  schemas:
    ProductInfo:
      type: object
      required: [name, version, mode]
      properties:
        name:
          type: string
          const: mammography-second-opinion
        version:
          type: string
          const: 0.1.0
        mode:
          type: string
          const: clinician-in-the-loop
    RuntimeStatus:
      type: object
      required: [metricsEnabled, shuttingDown, uptimeSeconds]
      properties:
        metricsEnabled:
          type: boolean
        shuttingDown:
          type: boolean
        uptimeSeconds:
          type: number
    ManifestScope:
      type: object
      required: [modality, examShape, standardViews]
      properties:
        modality:
          type: string
          const: FFDM
        examShape:
          type: string
          const: bilateral-four-view
        standardViews:
          type: array
          prefixItems:
            - const: L-CC
            - const: L-MLO
            - const: R-CC
            - const: R-MLO
          minItems: 4
          maxItems: 4
    ManifestSafety:
      type: object
      required: [reviewRequired, outputMode, autonomousDiagnosis]
      properties:
        reviewRequired:
          type: boolean
          const: true
        outputMode:
          type: string
          const: draft-only
        autonomousDiagnosis:
          type: boolean
          const: false
    ManifestResponse:
      type: object
      required: [product, mission, scope, safety, nonGoals]
      properties:
        product:
          $ref: '#/components/schemas/ProductInfo'
        mission:
          type: string
        scope:
          $ref: '#/components/schemas/ManifestScope'
        safety:
          $ref: '#/components/schemas/ManifestSafety'
        nonGoals:
          type: array
          items:
            type: string
    MetricsDisabledResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: disabled
    HealthResponse:
      type: object
      required: [status, product, scope, safety]
      properties:
        status:
          type: string
          const: ok
        product:
          $ref: '#/components/schemas/ProductInfo'
        scope:
          type: object
        safety:
          type: object
    ReadyResponse:
      type: object
      required: [status, product, runtime]
      properties:
        status:
          type: string
          enum: [ready, shutting_down]
        product:
          $ref: '#/components/schemas/ProductInfo'
        runtime:
          $ref: '#/components/schemas/RuntimeStatus'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId, correlationId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            correlationId:
              type: string
            issues:
              type: array
              items:
                type: object
                additionalProperties: true
    CaseAssessment:
      type: object
      required: [biradsCategory, summary, confidenceBand, outputMode]
      properties:
        biradsCategory:
          type: string
          enum: ['0', '1', '2', '3', '4', '5', '6']
        summary:
          type: string
        confidenceBand:
          type: string
          enum: [high, moderate, low]
        outputMode:
          type: string
          const: draft-only
    CaseSafety:
      type: object
      required: [flagCount, hasBlockingFlags]
      properties:
        flagCount:
          type: integer
        hasBlockingFlags:
          type: boolean
    CaseQualityFinding:
      type: object
      required: [code, severity, description]
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [info, warning]
        description:
          type: string
    CaseQuality:
      type: object
      required: [status, findingCount, findings]
      properties:
        status:
          type: string
          enum: [pass, warning]
        findingCount:
          type: integer
        findings:
          type: array
          items:
            $ref: '#/components/schemas/CaseQualityFinding'
    MammographyExam:
      type: object
      required: [studyInstanceUid, modality, standardViews]
      properties:
        studyInstanceUid:
          type: string
          minLength: 1
          maxLength: 128
        modality:
          type: string
          const: FFDM
        standardViews:
          type: array
          prefixItems:
            - const: L-CC
            - const: L-MLO
            - const: R-CC
            - const: R-MLO
          minItems: 4
          maxItems: 4
        patientAge:
          type: integer
          minimum: 18
          maximum: 120
        breastDensity:
          type: string
          enum: [A, B, C, D]
        accessionNumber:
          type: string
          minLength: 1
          maxLength: 64
    MammographyClinicalQuestion:
      type: object
      required: [questionText, urgency]
      properties:
        questionText:
          type: string
          minLength: 1
          maxLength: 2000
        urgency:
          type: string
          enum: [routine, urgent, stat]
    CreateCaseRequest:
      type: object
      required: [exam, clinicalQuestion]
      properties:
        exam:
          $ref: '#/components/schemas/MammographyExam'
        clinicalQuestion:
          $ref: '#/components/schemas/MammographyClinicalQuestion'
    DraftGenerationStage:
      type: object
      required: [name, status, latencyMs]
      properties:
        name:
          type: string
          enum: [exam-qc, draft-generation, safety-evaluation]
        status:
          type: string
          const: completed
        latencyMs:
          type: integer
    DraftGenerationSummary:
      type: object
      required: [orchestratorId, modelId, totalLatencyMs, stages]
      properties:
        orchestratorId:
          type: string
        modelId:
          type: string
        totalLatencyMs:
          type: integer
        stages:
          type: array
          items:
            $ref: '#/components/schemas/DraftGenerationStage'
    CaseReview:
      type: object
      required: [reviewerName, reviewerRole, disposition, finalBiradsCategory, finalSummary, reviewNotes, finalizedAt]
      properties:
        reviewerName:
          type: string
        reviewerRole:
          type: string
        disposition:
          type: string
          enum: [confirmed, modified]
        finalBiradsCategory:
          type: string
          enum: ['0', '1', '2', '3', '4', '5', '6']
        finalSummary:
          type: string
        reviewNotes:
          type: string
        finalizedAt:
          type: string
          format: date-time
    CaseDelivery:
      type: object
      required: [channel, destination, recipientName, deliveredBy, deliveredAt]
      properties:
        channel:
          type: string
          enum: [ehr, secure-email, worklist]
        destination:
          type: string
        recipientName:
          type: string
        deliveredBy:
          type: string
        deliveredAt:
          type: string
          format: date-time
    EventAuditContext:
      type: object
      required: [requestId, correlationId]
      properties:
        requestId:
          type: string
        correlationId:
          type: string
        actorId:
          type: string
        actorRole:
          type: string
    RenderedReport:
      type: object
      required: [format, filename, renderedAt, body]
      properties:
        format:
          type: string
          const: text/plain
        filename:
          type: string
        renderedAt:
          type: string
          format: date-time
        body:
          type: string
    MammographyCaseSubmittedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        audit:
          $ref: '#/components/schemas/EventAuditContext'
        type:
          type: string
          const: mammography.case-submitted.v1
        payload:
          type: object
          required: [modality, studyInstanceUid, standardViews, questionText, urgency]
          properties:
            modality:
              type: string
              const: FFDM
            studyInstanceUid:
              type: string
            standardViews:
              type: array
              prefixItems:
                - const: L-CC
                - const: L-MLO
                - const: R-CC
                - const: R-MLO
              minItems: 4
              maxItems: 4
            questionText:
              type: string
            urgency:
              type: string
              enum: [routine, urgent, stat]
    MammographyDraftGeneratedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        audit:
          $ref: '#/components/schemas/EventAuditContext'
        type:
          type: string
          const: mammography.draft-generated.v1
        payload:
          type: object
          required: [biradsCategory, confidenceBand, outputMode, modelId, latencyMs]
          properties:
            biradsCategory:
              type: string
              enum: ['0', '1', '2', '3', '4', '5', '6']
            confidenceBand:
              type: string
              enum: [high, moderate, low]
            outputMode:
              type: string
              const: draft-only
            modelId:
              type: string
            latencyMs:
              type: integer
    MammographyExamQcEvaluatedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        audit:
          $ref: '#/components/schemas/EventAuditContext'
        type:
          type: string
          const: mammography.exam-qc-evaluated.v1
        payload:
          $ref: '#/components/schemas/CaseQuality'
    MammographyDraftOrchestrationCompletedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        audit:
          $ref: '#/components/schemas/EventAuditContext'
        type:
          type: string
          const: mammography.draft-orchestration-completed.v1
        payload:
          $ref: '#/components/schemas/DraftGenerationSummary'
    MammographyCaseReviewFinalizedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        audit:
          $ref: '#/components/schemas/EventAuditContext'
        type:
          type: string
          const: mammography.case-review-finalized.v1
        payload:
          $ref: '#/components/schemas/CaseReview'
    MammographyCaseDeliveredEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        audit:
          $ref: '#/components/schemas/EventAuditContext'
        type:
          type: string
          const: mammography.case-delivered.v1
        payload:
          $ref: '#/components/schemas/CaseDelivery'
    MammographySafetyFlagsAppliedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        audit:
          $ref: '#/components/schemas/EventAuditContext'
        type:
          type: string
          const: mammography.safety-flags-applied.v1
        payload:
          type: object
          required: [flagCount, hasBlockingFlags, flags]
          properties:
            flagCount:
              type: integer
            hasBlockingFlags:
              type: boolean
            flags:
              type: array
              items:
                type: object
                required: [code, severity, description, blocksReview]
                properties:
                  code:
                    type: string
                  severity:
                    type: string
                    enum: [info, warning, critical]
                  description:
                    type: string
                  blocksReview:
                    type: boolean
    MammographyCaseLifecycleEvent:
      oneOf:
        - $ref: '#/components/schemas/MammographyCaseSubmittedEvent'
        - $ref: '#/components/schemas/MammographyExamQcEvaluatedEvent'
        - $ref: '#/components/schemas/MammographyDraftGeneratedEvent'
        - $ref: '#/components/schemas/MammographySafetyFlagsAppliedEvent'
        - $ref: '#/components/schemas/MammographyDraftOrchestrationCompletedEvent'
        - $ref: '#/components/schemas/MammographyCaseReviewFinalizedEvent'
        - $ref: '#/components/schemas/MammographyCaseDeliveredEvent'
        - $ref: '#/components/schemas/MammographyReportIntegritySealedEvent'
    MammographyReportIntegritySeal:
      type: object
      required: [algorithm, reportHash, sealedAt, sealedBy]
      properties:
        algorithm:
          type: string
          const: SHA-256
        reportHash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        sealedAt:
          type: string
          format: date-time
        sealedBy:
          type: string
    MammographyReportIntegritySealedEvent:
      type: object
      required: [eventId, caseId, occurredAt, type, payload]
      properties:
        eventId:
          type: string
          format: uuid
        caseId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        audit:
          $ref: '#/components/schemas/EventAuditContext'
        type:
          type: string
          const: mammography.report-integrity-sealed.v1
        payload:
          $ref: '#/components/schemas/MammographyReportIntegritySeal'
    ReportSealInput:
      type: object
      required: [sealedBy]
      properties:
        sealedBy:
          type: string
          minLength: 1
          maxLength: 200
    ReportSealResponse:
      type: object
      required: [caseId, integritySeal]
      properties:
        caseId:
          type: string
          format: uuid
        integritySeal:
          $ref: '#/components/schemas/MammographyReportIntegritySeal'
    ReportIntegrityResponse:
      type: object
      required: [caseId, verified, currentHash, integritySeal]
      properties:
        caseId:
          type: string
          format: uuid
        verified:
          type: boolean
        currentHash:
          type: string
          pattern: '^[a-f0-9]{64}$'
        integritySeal:
          $ref: '#/components/schemas/MammographyReportIntegritySeal'
    CaseResponse:
      type: object
      required: [caseId, status, assessment, qc, generation, review, delivery, safety]
      properties:
        caseId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Submitted, AwaitingReview, Finalized]
        assessment:
          anyOf:
            - $ref: '#/components/schemas/CaseAssessment'
            - type: 'null'
        qc:
          anyOf:
            - $ref: '#/components/schemas/CaseQuality'
            - type: 'null'
        generation:
          anyOf:
            - $ref: '#/components/schemas/DraftGenerationSummary'
            - type: 'null'
        review:
          anyOf:
            - $ref: '#/components/schemas/CaseReview'
            - type: 'null'
        delivery:
          anyOf:
            - $ref: '#/components/schemas/CaseDelivery'
            - type: 'null'
        safety:
          $ref: '#/components/schemas/CaseSafety'
    CaseReportResponse:
      type: object
      required: [caseId, status, report]
      properties:
        caseId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Finalized]
        report:
          $ref: '#/components/schemas/RenderedReport'
    OhifReviewSeamResponse:
      type: object
      required: [caseId, viewer, dataSource, workflow]
      properties:
        caseId:
          type: string
          format: uuid
        viewer:
          type: object
          required: [vendor, viewerPath, query]
          properties:
            vendor:
              type: string
              const: OHIF
            viewerPath:
              type: string
              const: /viewer
            query:
              type: object
              required: [StudyInstanceUIDs, modalities]
              properties:
                StudyInstanceUIDs:
                  type: array
                  items:
                    type: string
                modalities:
                  type: string
                  const: MG
        dataSource:
          type: object
          required: [namespace, sourceName, qidoRoot, wadoRoot, wadoUriRoot, ready]
          properties:
            namespace:
              type: string
              const: dicomweb
            sourceName:
              type: string
            qidoRoot:
              anyOf:
                - type: string
                - type: 'null'
            wadoRoot:
              anyOf:
                - type: string
                - type: 'null'
            wadoUriRoot:
              anyOf:
                - type: string
                - type: 'null'
            ready:
              type: boolean
        workflow:
          type: object
          required: [caseStatus, reviewReady]
          properties:
            caseStatus:
              type: string
              enum: [Submitted, AwaitingReview, Finalized]
            reviewReady:
              type: boolean
    DicomwebArchiveSeamResponse:
      type: object
      required: [caseId, study, archive, workflow]
      properties:
        caseId:
          type: string
          format: uuid
        study:
          type: object
          required: [studyInstanceUid, accessionNumber, modality]
          properties:
            studyInstanceUid:
              type: string
            accessionNumber:
              anyOf:
                - type: string
                - type: 'null'
            modality:
              type: string
              const: MG
        archive:
          type: object
          required: [vendor, sourceName, dicomwebRoot, qidoRoot, wadoRoot, wadoUriRoot, ready]
          properties:
            vendor:
              type: string
              const: Orthanc
            sourceName:
              type: string
            qidoRoot:
              anyOf:
                - type: string
                - type: 'null'
            wadoRoot:
              anyOf:
                - type: string
                - type: 'null'
            wadoUriRoot:
              anyOf:
                - type: string
                - type: 'null'
            dicomwebRoot:
              anyOf:
                - type: string
                - type: 'null'
            ready:
              type: boolean
        workflow:
          type: object
          required: [ohifReviewSeamPath, reviewReady]
          properties:
            ohifReviewSeamPath:
              type: string
            reviewReady:
              type: boolean
    PythonSidecarIntegrationSeamResponse:
      type: object
      required: [sidecar, health, readiness, manifest, capabilities]
      properties:
        sidecar:
          type: object
          required: [baseUrl, configured, reachable]
          properties:
            baseUrl:
              anyOf:
                - type: string
                - type: 'null'
            configured:
              type: boolean
            reachable:
              type: boolean
        health:
          type: object
          required: [status, mode]
          properties:
            status:
              anyOf:
                - type: string
                - type: 'null'
            mode:
              anyOf:
                - type: string
                - type: 'null'
        readiness:
          type: object
          required: [status, acceptingJobs]
          properties:
            status:
              anyOf:
                - type: string
                - type: 'null'
            acceptingJobs:
              anyOf:
                - type: boolean
                - type: 'null'
        manifest:
          type: object
          required: [productName, outputShape, outputMode]
          properties:
            productName:
              anyOf:
                - type: string
                - type: 'null'
            outputShape:
              anyOf:
                - type: string
                - type: 'null'
            outputMode:
              anyOf:
                - type: string
                - type: 'null'
        capabilities:
          type: object
          required: [mode, implementedTasks, plannedTasks, docs]
          properties:
            mode:
              anyOf:
                - type: string
                - type: 'null'
            implementedTasks:
              type: array
              items:
                type: string
            plannedTasks:
              type: array
              items:
                type: string
            docs:
              type: array
              items:
                type: string
    CaseEventsResponse:
      type: object
      required: [caseId, count, events]
      properties:
        caseId:
          type: string
          format: uuid
        count:
          type: integer
        events:
          type: array
          items:
            $ref: '#/components/schemas/MammographyCaseLifecycleEvent'
    CaseSummary:
      type: object
      required: [caseId, status, modality, studyInstanceUid, createdAt, assessmentSummary]
      properties:
        caseId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Submitted, AwaitingReview, Finalized]
        modality:
          type: string
          const: FFDM
        studyInstanceUid:
          type: string
        createdAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
        assessmentSummary:
          anyOf:
            - type: string
            - type: 'null'
    CaseListResponse:
      type: object
      required: [cases, total, limit, offset]
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/CaseSummary'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      operationId: getReadiness
      responses:
        '200':
          description: Readiness status when the process is accepting work.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Readiness status when the process is shutting down.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /metrics:
    get:
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus metrics output
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Metrics endpoint is disabled for the current runtime
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsDisabledResponse'
  /api/v1/manifest:
    get:
      operationId: getManifest
      responses:
        '200':
          description: Machine-readable scope manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestResponse'
  /api/v1/integration-seams/python-sidecar:
    get:
      operationId: renderPythonSidecarIntegrationSeam
      responses:
        '200':
          description: Live integration seam for the optional Python sidecar scaffold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PythonSidecarIntegrationSeamResponse'
        '500':
          description: Unexpected server-side failure during sidecar seam rendering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/v1/cases:
    get:
      operationId: listCases
      parameters:
        - $ref: '#/components/parameters/AuthorizationBearerHeader'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated list of mammography case summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseListResponse'
        '400':
          description: Invalid pagination query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Unexpected server-side failure during case listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      operationId: createCase
      parameters:
        - $ref: '#/components/parameters/AuthorizationBearerHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/ActorRoleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        '201':
          description: Draft mammography case created
          content:
            application/json:
              schema:
